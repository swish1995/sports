{% extends "base.html" %}
{% block title %}문제 편집 - #{{ q.id }}{% endblock %}

{% block content %}
<div class="edit-header">
    <h1>문제 편집</h1>
    <span class="edit-id">#{{ q.id }}</span>
</div>

<!-- 미리보기 -->
<div class="exam-section" id="previewSection" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem">
        <h2>미리보기</h2>
        <button type="button" class="btn btn-sm" onclick="togglePreview()">닫기</button>
    </div>
    <div class="question-card">
        <div class="question-text" id="previewQuestion"></div>
        <div class="options" id="previewOptions"></div>
    </div>
</div>

<form action="/edit/{{ q.id }}/save" method="POST" class="edit-form" id="editForm">
    <input type="hidden" name="return_url" value="{{ request.args.get('return_url', '/edit') }}">

    <!-- 메타 정보 -->
    <div class="edit-meta-row">
        <div class="form-group">
            <label>과목</label>
            <select name="subject">
                {% for s in subjects %}
                <option value="{{ s.name }}" {{ 'selected' if s.name == q.subject_name }}>
                    {{ s.name }} ({{ s.category }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>연도</label>
            <input type="text" name="exam_year" value="{{ q.exam_year or '' }}" placeholder="2025">
        </div>
        <div class="form-group">
            <label>유형</label>
            <input type="text" name="exam_type" value="{{ q.exam_type or '' }}" placeholder="A">
        </div>
        <div class="form-group">
            <label>문항번호</label>
            <input type="number" name="question_number" value="{{ q.question_number or '' }}" placeholder="1">
        </div>
    </div>

    <!-- 지문 -->
    <div class="form-group">
        <label>
            지문 <small class="hint">Enter로 줄바꿈, | 로 표 구분</small>
        </label>
        <textarea name="question_text" rows="6" class="edit-textarea" id="questionText">{{ q.question_text }}</textarea>
    </div>

    <div style="margin-bottom:1rem">
        <button type="button" class="btn btn-sm" onclick="togglePreview()">미리보기</button>
    </div>

    <!-- 보기 -->
    {% if q.question_type == 'multiple_choice' %}
    <div class="edit-options-grid">
        <div class="form-group">
            <label>① 보기 A</label>
            <textarea name="option_a" rows="2" id="optA">{{ q.option_a or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>② 보기 B</label>
            <textarea name="option_b" rows="2" id="optB">{{ q.option_b or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>③ 보기 C</label>
            <textarea name="option_c" rows="2" id="optC">{{ q.option_c or '' }}</textarea>
        </div>
        <div class="form-group">
            <label>④ 보기 D</label>
            <textarea name="option_d" rows="2" id="optD">{{ q.option_d or '' }}</textarea>
        </div>
    </div>

    <div class="form-group">
        <label>정답</label>
        <select name="correct_answer" class="answer-select">
            <option value="A" {{ 'selected' if q.correct_answer == 'A' }}>① A</option>
            <option value="B" {{ 'selected' if q.correct_answer == 'B' }}>② B</option>
            <option value="C" {{ 'selected' if q.correct_answer == 'C' }}>③ C</option>
            <option value="D" {{ 'selected' if q.correct_answer == 'D' }}>④ D</option>
            <option value="ALL" {{ 'selected' if q.correct_answer == 'ALL' }}>전부 정답</option>
        </select>
    </div>
    {% else %}
    <div class="form-group">
        <label>모범답안</label>
        <textarea name="correct_answer" rows="4">{{ q.correct_answer or '' }}</textarea>
    </div>
    {% endif %}

    <!-- 코멘트 -->
    <div class="form-group">
        <label>코멘트 <small class="hint">시험 중 💡 표시, 결과에서 해설로 표시, Enter로 줄바꿈</small></label>
        <textarea name="comment" rows="4" placeholder="해설, 암기 포인트, 헷갈리는 부분 등...">{{ q.comment or '' }}</textarea>
    </div>

    <!-- 버튼 -->
    <div class="edit-actions">
        <button type="submit" class="btn btn-primary">저장</button>
        <a href="{{ request.args.get('return_url', '/edit') }}" class="btn btn-secondary">취소</a>
    </div>
</form>

<!-- 삭제 -->
<form action="/edit/{{ q.id }}/delete" method="POST" class="delete-form"
      onsubmit="return confirm('정말 삭제하시겠습니까?')">
    <input type="hidden" name="return_url" value="{{ request.args.get('return_url', '/edit') }}">
    <button type="submit" class="btn btn-danger">문제 삭제</button>
</form>

<script>
function togglePreview() {
    const section = document.getElementById('previewSection');
    const visible = section.style.display !== 'none';
    if (visible) {
        section.style.display = 'none';
        return;
    }
    // 지문 미리보기
    const text = document.getElementById('questionText').value;
    fetch('/api/preview', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text})
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('previewQuestion').innerHTML = data.html;
    });

    // 보기 미리보기
    const opts = document.getElementById('previewOptions');
    if (opts) {
        const ids = ['optA', 'optB', 'optC', 'optD'];
        const labels = ['1', '2', '3', '4'];
        let html = '';
        ids.forEach((id, i) => {
            const el = document.getElementById(id);
            if (el && el.value.trim()) {
                html += `<div class="option-label" style="pointer-events:none">
                    <span class="option-key">${labels[i]}</span>
                    <span class="option-text">${el.value}</span>
                </div>`;
            }
        });
        opts.innerHTML = html;
    }

    section.style.display = 'block';
    section.scrollIntoView({behavior: 'smooth', block: 'start'});
}
</script>
{% endblock %}
